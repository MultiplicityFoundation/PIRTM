name: CI

on:
  push:
    branches: [Multiplicity]
  pull_request:
    branches: [Multiplicity]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy src/pirtm/

  critical-suites:
    name: Critical suites (ACE + transpiler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[all]"
      - run: |
          pytest -v \
            tests/test_cli_transpile.py \
            tests/test_transpiler.py \
            tests/test_ace_protocol.py \
            tests/test_ace_protocol_injection.py \
            tests/test_ace_matrix_immutability.py \
            tests/test_simulations_modernized.py

  test:
    name: Test (pytest) — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[all]"
      - run: pytest --cov=pirtm --cov-report=term-missing -v
