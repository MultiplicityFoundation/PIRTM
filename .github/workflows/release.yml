name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Publish to PyPI (requires pypi environment approval/credentials)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]"

      - name: Lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type-check
        run: mypy src/pirtm/

      - name: Run critical suites
        run: |
          pytest -v \
            tests/test_cli_transpile.py \
            tests/test_transpiler.py \
            tests/test_ace_protocol.py \
            tests/test_ace_protocol_injection.py \
            tests/test_ace_matrix_immutability.py \
            tests/test_simulations_modernized.py

      - name: Conformance profile
        run: pirtm-conformance --profile all --output text

  build:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build artifacts
        run: python -m build

      - name: Verify artifacts
        run: python -m twine check dist/*

      - name: Compute SHA256 checksums
        run: sha256sum dist/* | sort > dist/SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*

  publish:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.publish_to_pypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
